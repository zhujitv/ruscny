name: tooyei_translator
description: 中俄双手机实时语音翻译客户端。
publish_to: none
version: 0.1.10+8018

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  app_links: ^6.4.0
  connectivity_plus: ^6.1.4
  cross_file: ^0.3.4+2
  dio: ^5.8.0+1
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^9.2.4
  go_router: ^15.1.1
  intl: ^0.20.2
  just_audio: ^0.10.2
  mobile_scanner: ^7.0.1
  path: ^1.9.1
  path_provider: ^2.1.5
  permission_handler: ^12.0.0+1
  qr_flutter: ^4.1.0
  record: ^6.0.0
  share_plus: ^11.0.0
  socket_io_client: ^3.1.6
  sqflite: ^2.4.2
  uuid: ^4.5.1
  web_socket: ^1.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/legal/
